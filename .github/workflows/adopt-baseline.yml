name: Adopt production database baseline

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact 40-character commit on main to adopt
        required: true
        type: string
      confirmation:
        description: Type ADOPT_BASELINE
        required: true
        type: string
      restore_evidence_sha256:
        description: SHA-256 independently computed from the private restore evidence bundle
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

env:
  ADOPTION_COMMIT_SHA: ${{ inputs.commit_sha }}
  ADOPTION_CONFIRMATION: ${{ inputs.confirmation }}
  ADOPTION_RESTORE_EVIDENCE_SHA256: ${{ inputs.restore_evidence_sha256 }}
  DEPLOY_RELEASE_TAG: db-v1.0.0

jobs:
  preflight:
    name: Verify immutable adoption inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate dispatch inputs
        shell: bash
        run: |
          test "${ADOPTION_CONFIRMATION}" = "ADOPT_BASELINE"
          [[ "${ADOPTION_COMMIT_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${ADOPTION_RESTORE_EVIDENCE_SHA256}" =~ ^sha256:[0-9a-f]{64}$ ]]
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
      - name: Require the selected commit at the tip of main
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${ADOPTION_COMMIT_SHA}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "${ADOPTION_COMMIT_SHA}"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:contract
      - run: node scripts/verify-recovery-attestation.mjs
      - name: Require the independently supplied recovery hash
        shell: bash
        run: |
          attested_hash="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('recovery-attestation.json', 'utf8')).restoreEvidenceSha256)")"
          test "${ADOPTION_RESTORE_EVIDENCE_SHA256}" = "${attested_hash}"

  plan:
    name: Build bookkeeping-only adoption plan
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-plan
    outputs:
      plan-sha256: ${{ steps.plan.outputs.sha256 }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:contract
      - run: node scripts/verify-recovery-attestation.mjs
      - name: Link the protected production project
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: npx supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"
      - name: Verify the captured ledger and render the exact repair plan
        id: plan
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          npx supabase migration list --linked --password "${SUPABASE_DB_PASSWORD}" 2>&1 | tee migration-list-before.txt
          node scripts/normalize-migration-state.mjs migration-list-before.txt > migration-state-before.txt
          node scripts/verify-baseline-adoption-state.mjs before migration-state-before.txt
          node scripts/render-baseline-adoption-plan.mjs > baseline-adoption-plan.txt
          sha256sum baseline-adoption-plan.txt > baseline-adoption-plan.sha256
          echo "sha256=$(cut -d ' ' -f1 baseline-adoption-plan.sha256)" >> "$GITHUB_OUTPUT"
          {
            echo '## Bookkeeping-only baseline adoption'
            echo
            echo 'This plan changes only `supabase_migrations.schema_migrations`.'
            echo 'It executes no baseline DDL and changes no league rows.'
            echo
            echo '~~~text'
            cat baseline-adoption-plan.txt
            echo '~~~'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Reconfirm schema parity before approval
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          npx supabase db diff --linked --schema public --output schema.diff
          node scripts/verify-schema-diff.mjs schema.diff
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-adoption-plan-${{ github.run_id }}
          path: |
            migration-list-before.txt
            migration-state-before.txt
            baseline-adoption-plan.txt
            baseline-adoption-plan.sha256
            schema.diff
          if-no-files-found: error
          retention-days: 30

  apply:
    name: Protected bookkeeping-only adoption
    needs: [preflight, plan]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: baseline-adoption-plan-${{ github.run_id }}
          path: approved-plan
      - name: Verify the approved plan artifact
        shell: bash
        env:
          APPROVED_PLAN_SHA256: ${{ needs.plan.outputs.plan-sha256 }}
        run: echo "${APPROVED_PLAN_SHA256}  approved-plan/baseline-adoption-plan.txt" | sha256sum --check -
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:contract
      - run: node scripts/verify-recovery-attestation.mjs
      - name: Revalidate remote state and schema, then repair only the ledger
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -o pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "${ADOPTION_COMMIT_SHA}"
          npx supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"
          npx supabase migration list --linked --password "${SUPABASE_DB_PASSWORD}" 2>&1 | tee migration-list-current.txt
          node scripts/normalize-migration-state.mjs migration-list-current.txt > migration-state-current.txt
          diff --unified approved-plan/migration-state-before.txt migration-state-current.txt
          node scripts/verify-baseline-adoption-state.mjs before migration-state-current.txt
          npx supabase db diff --linked --schema public --output schema-before.diff
          node scripts/verify-schema-diff.mjs schema-before.diff
          mapfile -t historical_versions < <(node -e "for (const row of JSON.parse(require('fs').readFileSync('baseline-adoption.json', 'utf8')).historicalMigrations) console.log(row.version)")
          baseline_version="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('baseline-adoption.json', 'utf8')).migrationHead)")"
          npx supabase migration repair "${historical_versions[@]}" --status reverted --linked --password "${SUPABASE_DB_PASSWORD}"
          npx supabase migration repair "${baseline_version}" --status applied --linked --password "${SUPABASE_DB_PASSWORD}"
      - name: Verify exact parity, empty push, and unchanged schema
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          npx supabase migration list --linked --password "${SUPABASE_DB_PASSWORD}" 2>&1 | tee migration-list-after.txt
          node scripts/normalize-migration-state.mjs migration-list-after.txt > migration-state-after.txt
          node scripts/verify-baseline-adoption-state.mjs after migration-state-after.txt
          node scripts/verify-migration-parity.mjs migration-list-after.txt
          npx supabase db push --linked --dry-run --yes --password "${SUPABASE_DB_PASSWORD}" 2>&1 | tee post-adoption-plan.txt
          node scripts/verify-empty-push-plan.mjs post-adoption-plan.txt
          npx supabase test db --linked supabase/tests
          npx supabase db diff --linked --schema public --output schema-after.diff
          node scripts/verify-schema-diff.mjs schema-after.diff
      - name: Publish immutable db-v1.0.0 contract release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('contract.json', 'utf8')).version)")" = "${DEPLOY_RELEASE_TAG}"
          git fetch --tags origin
          if gh release view "${DEPLOY_RELEASE_TAG}" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "refs/tags/${DEPLOY_RELEASE_TAG}")" = "${ADOPTION_COMMIT_SHA}"
          else
            gh release create "${DEPLOY_RELEASE_TAG}" --target "${ADOPTION_COMMIT_SHA}" --title "${DEPLOY_RELEASE_TAG}" --notes "Verified SAL database contract ${DEPLOY_RELEASE_TAG}."
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: baseline-adoption-verification-${{ github.run_id }}
          path: |
            migration-list-current.txt
            migration-state-current.txt
            schema-before.diff
            migration-list-after.txt
            migration-state-after.txt
            post-adoption-plan.txt
            schema-after.diff
          if-no-files-found: warn
          retention-days: 90
